<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет Бара - ПК Клуб</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 Учет Бара ПК Клуба</h1>
        
        <div class="stats">
            <div>Всего товара: <span id="totalItems">0</span> шт.</div>
        </div>

        <div class="items-grid" id="itemsGrid"></div>

        <div class="buttons">
            <button class="btn btn-success" onclick="showReport()">📊 Итог смены</button>
            <button class="btn btn-warning" onclick="newShift()">🔄 Новая смена</button>
        </div>

        <div id="reportModal" class="modal hidden">
            <div class="modal-content">
                <h2>Отчет за смену</h2>
                <div id="reportContent"></div>
                <button class="btn btn-danger" onclick="closeReport()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
